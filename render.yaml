services:
  - type: web
    name: chrono-lab
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: SESSION_SECRET
        generateValue: true
      - key: DB_PATH
        value: /var/data/chronolab.db
    disk:
      name: chrono-lab-data
      mountPath: /var/data
      sizeGB: 1
